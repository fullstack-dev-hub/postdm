name: Deploy Backend to EC2

on:
  push:
    branches:
      - main
      - develop
      - feature/*

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      - name: Login to AWS ECR
        run: |
          ECR_URL="${{ secrets.AWS_ECR_REPOSITORY }}"
          echo "Logging into AWS ECR: $ECR_URL"
          aws ecr get-login-password --region ap-northeast-2 | docker login --username AWS --password-stdin $ECR_URL

      - name: Build Docker image and push to AWS ECR
        run: |
          cd backend
          docker build -t backend-service .
          docker tag backend-service:latest ${{ secrets.AWS_ECR_REPOSITORY }}:latest
          docker push ${{ secrets.AWS_ECR_REPOSITORY }}:latest

      - name: Logout from AWS ECR
        run: |
          docker logout ${{ secrets.AWS_ECR_REPOSITORY }}
          echo "Logged out from AWS ECR."

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          script: |
            cd /home/${{ secrets.EC2_USERNAME }}/backend
            
            echo "PULLING LATEST IMAGE..."
            sudo docker image rm ${{ secrets.AWS_ECR_REPOSITORY }}:latest || true
            sudo docker pull ${{ secrets.AWS_ECR_REPOSITORY }}:latest
            
            echo "STOPPING AND REMOVING EXISTING CONTAINERS..."
            sudo docker-compose down --remove-orphans || true
            
            echo "REMOVING UNUSED DOCKER IMAGES..."
            sudo docker system prune -af
        
            echo "UPDATING .env FILE..."
            echo "MYSQL_URL=${{ secrets.MYSQL_URL }}" > .env
            echo "MYSQL_USERNAME=${{ secrets.MYSQL_USERNAME }}" >> .env
            echo "MYSQL_PASSWORD=${{ secrets.MYSQL_PASSWORD }}" >> .env
            echo "MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}" >> .env
            echo "MYSQL_DATABASE=${{ secrets.MYSQL_DATABASE }}" >> .env
            
            echo "CHECKING .env FILE CONTENTS:"
            cat .env || { echo "ERROR: .env file not created properly."; exit 1; }
            
            echo "STARTING NEW CONTAINER..."
            sudo docker-compose up -d --force-recreate
            
            echo "✅ DEPLOYMENT COMPLETE!"