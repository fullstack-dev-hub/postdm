name: Deploy Backend to EC2

on:
  push:
    branches:
      - main
      - develop
      - feature/*

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      - name: Update Security Group for GitHub Actions (Single Rule)
        run: |
          GITHUB_IP=$(curl -s https://api.github.com/meta | jq -r '.actions[]' | head -n 1)  # 최신 GitHub Actions IP 1개만 가져오기
          SECURITY_GROUP_ID=${{ secrets.AWS_POSTDM_SG_ID }}

          echo "Current GitHub Actions Runner IP: $GITHUB_IP"

          OLD_IPS=$(aws ec2 describe-security-groups --group-ids $SECURITY_GROUP_ID \
            --query "SecurityGroups[*].IpPermissions[?ToPort==\`22\`].IpRanges[*].CidrIp" --output text)

          for OLD_IP in $OLD_IPS; do
            echo "Removing old SSH rule for IP: $OLD_IP"
            aws ec2 revoke-security-group-ingress --group-id $SECURITY_GROUP_ID \
              --protocol tcp --port 22 --cidr $OLD_IP || true
          done

          echo "Adding new SSH rule for IP: $GITHUB_IP"
          aws ec2 authorize-security-group-ingress --group-id $SECURITY_GROUP_ID \
            --protocol tcp --port 22 --cidr $GITHUB_IP


      - name: Login to AWS ECR
        run: |
          aws ecr get-login-password --region ap-northeast-2 | docker login --username AWS --password-stdin ${{ secrets.AWS_ECR_REPOSITORY }}

      - name: Set up Java 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: 17

      - name: Grant execute permission to Gradle Wrapper
        run: chmod +x backend/gradlew

      - name: Build backend project
        run: |
          cd backend
          ./gradlew build -x test

      - name: Build Docker image and push to AWS ECR
        run: |
          cd backend
          docker build -t backend-service . 
          docker tag backend-service:latest ${{ secrets.AWS_ECR_REPOSITORY }}:latest
          docker push ${{ secrets.AWS_ECR_REPOSITORY }}:latest
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: "ap-northeast-2"

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          script: |
            cd /home/ec2-user/backend
            echo "PULLING LATEST IMAGE..."
            sudo docker pull ${{ secrets.AWS_ECR_REPOSITORY }}:latest
            
            echo "STOPPING EXISTING CONTAINER..."
            sudo docker-compose down || true
            
            echo "UPDATING .env FILE..."
            echo "MYSQL_URL=${{ secrets.MYSQL_URL }}" > .env
            echo "MYSQL_USERNAME=${{ secrets.MYSQL_USERNAME }}" >> .env
            echo "MYSQL_PASSWORD=${{ secrets.MYSQL_PASSWORD }}" >> .env
            echo "MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}" >> .env
            echo "MYSQL_DATABASE=${{ secrets.MYSQL_DATABASE }}" >> .env
            
            echo "STARTING NEW CONTAINER..."
            sudo docker-compose up -d