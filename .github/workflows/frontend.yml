name: Deploy Frontend to EC2

on:
  push:
    branches:
      - main
      - develop
      - feature/**
    workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Get GitHub Actions Public IP
        id: ip
        uses: haythem/public-ip@v1.3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      - name: Authorize GitHub IP for EC2 SSH
        run: |
          aws ec2 authorize-security-group-ingress \
            --group-id ${{ secrets.AWS_SECURITY_GROUP_ID }} \
            --protocol tcp \
            --port 22 \
            --cidr ${{ steps.ip.outputs.ipv4 }}/32

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build Docker image and push to AWS ECR
        run: |
          cd frontend
          docker build -t frontend-service .
          docker tag frontend-service:latest ${{ secrets.AWS_ECR_FRONTEND_REPOSITORY }}:latest
          docker push ${{ secrets.AWS_ECR_FRONTEND_REPOSITORY }}:latest

      - name: SSH into EC2 and deploy frontend
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          port: ${{ secrets.PORT }}
          script: |
            cd /home/${{ secrets.EC2_USERNAME }}/postdm
            
            echo "Logging into ECR and pulling image..."
            aws ecr get-login-password --region ap-northeast-2 | docker login --username AWS --password-stdin ${{ secrets.AWS_ECR_FRONTEND_REPOSITORY }}
            
            echo "PULLING LATEST IMAGE..."
            docker pull ${{ secrets.AWS_ECR_FRONTEND_REPOSITORY }}:latest
            
            echo "STOPPING AND REMOVING EXISTING CONTAINERS..."
            sudo docker compose down --remove-orphans || true
            
            echo "REMOVING UNUSED DOCKER IMAGES..."
            docker image rm ${{ secrets.AWS_ECR_FRONTEND_REPOSITORY }}:latest || true
            
            echo "STARTING NEW CONTAINER..."
            sudo docker compose up -d --force-recreate
            
            echo "✅ DEPLOYMENT COMPLETE!"

      - name: Remove GitHub Actions IP from EC2 security group
        if: always()
        run: |
          aws ec2 revoke-security-group-ingress \
            --group-id ${{ secrets.AWS_SECURITY_GROUP_ID }} \
            --protocol tcp \
            --port 22 \
            --cidr ${{ steps.ip.outputs.ipv4 }}/32