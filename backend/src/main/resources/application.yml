spring:
  application:
    name: backend
  profiles:
    active: dev
  datasource: # H2 인메모리 DB 사용(GitHub Actions)
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
  sql:
    init:
      mode: always